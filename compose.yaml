# docker-compose.yml
services:
  # Ollama service
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Model initialization service (runs once to pull the model)
  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "
        echo 'Ollama is healthy. Pulling gemma:2b model...' &&
        OLLAMA_HOST=ollama:11434 ollama pull gemma:2b &&
        echo 'Model pull complete!'
      "

  # Your web application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobs99-web
    ports:
      - "8000:8000"
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    environment:
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - ./uploads:/app/uploads  # Persist uploads

volumes:
  ollama_data:
    driver: local